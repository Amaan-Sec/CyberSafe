name: mahacyber_safe
description: MahaCyber Safe — citizen cybersecurity companion for Maharashtra. RASP-protected Flutter prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # RASP — runtime app self-protection (Talsec freeRASP)
  freerasp: ^7.0.0

  # Navigation
  go_router: ^14.2.0

  # State management (kept lightweight for prototype)
  provider: ^6.1.2

  # Scanners / device info
  mobile_scanner: ^5.1.1
  network_info_plus: ^5.0.3
  wifi_scan: ^0.4.1+1
  geolocator: ^13.0.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1

  # Networking
  http: ^1.2.2
  url_launcher: ^6.3.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  fluttertoast: ^8.2.6

  # Text-to-speech (Sarvam server-side primary, device fallback)
  flutter_tts: ^4.0.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4

  # Storage / utils
  shared_preferences: ^2.3.0
  crypto: ^3.0.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
